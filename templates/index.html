<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tox21 Toxicity Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <script src="https://unpkg.com/smiles-drawer@2.0.1/dist/smiles-drawer.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tox21 Toxicity Predictor</h1>
            <p class="subtitle">Predict nuclear receptor (NR-AR) toxicity using machine learning</p>
        </header>
        
        <div class="input-section">
            <label for="smiles-input">Enter SMILES String:</label>
            <input type="text" id="smiles-input" placeholder="e.g., CC(=O)OC1=CC=CC=C1C(=O)O (Aspirin)" />
            <button id="predict-btn" onclick="predictToxicity()">Predict Toxicity</button>
            
            <div class="smiles-examples">
                <span class="example-title">Try an example:</span>
                <div class="example-buttons">
                    <button type="button" class="example-btn" onclick="loadExample('CC(=O)OC1=CC=CC=C1C(=O)O')">Aspirin</button>
                    <button type="button" class="example-btn" onclick="loadExample('CN1C=NC2=C1C(=O)N(C(=O)N2C)C')">Caffeine</button>
                    <button type="button" class="example-btn" onclick="loadExample('CCO')">Ethanol</button>
                    <button type="button" class="example-btn" onclick="loadExample('C1=CC=C(C=C1)O')">Phenol</button>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Computing descriptors and predicting...</p>
        </div>
        
        <div id="results" class="results hidden">
            <h2>Prediction Results</h2>
            
            <div class="results-main-layout">
                
                <div class="molecule-viewer">
                    <canvas id="molecule-canvas" width="220" height="220"></canvas>
                </div>
                
                <div id="prediction-result" class="prediction-box">
                    <div id="toxicity-label" class="toxicity-label"></div>
                    <div class="probability-bar-container">
                        <div id="probability-bar" class="probability-bar"></div>
                    </div>
                    <p id="probability-text" class="probability-text"></p>
                </div>
                
            </div>
            
            <div id="descriptor-info" class="descriptor-info">
                <h3>Top 5 Important Descriptors (SHAP Impact):</h3>
                <p class="shap-intro">These are the molecular features that contributed most to this specific prediction:</p>
                <ul id="shap-list" class="shap-list">
                    </ul>
            </div>
        </div>
        
        <div id="error" class="error hidden"></div>
    </div>
    
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
